<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Recipe Macros</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            background: #f4f5f7;
            color: #1a1a1a;
            font-size: 14px;
            line-height: 1.5;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem;
        }

        header {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        header h1 a {
            color: #2563eb;
            text-decoration: none;
        }

        header .tagline {
            color: #8993a4;
            font-size: 0.8rem;
        }

        #loading {
            color: #8993a4;
            font-size: 0.85rem;
        }

        /* Stat cards */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e5ea;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .stat-card {
            text-align: center;
            padding: 0.85rem 0.5rem;
            border-right: 1px solid #eef0f3;
            border-bottom: 1px solid #eef0f3;
        }

        .stat-card:nth-child(3n) { border-right: none; }
        .stat-card:nth-child(n+4) { border-bottom: none; }

        .stat-card .value {
            font-size: 1.4rem;
            font-weight: 700;
            display: block;
            line-height: 1.2;
            color: #2563eb;
        }

        .stat-card .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8993a4;
            font-weight: 600;
        }

        /* Card sections */
        .card {
            background: #fff;
            border: 1px solid #e2e5ea;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .section-head {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8993a4;
            margin-bottom: 0.6rem;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            font-weight: 500;
            color: #8993a4;
            padding: 0.3rem 0.5rem;
            border-bottom: 2px solid #eef0f3;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 0.4rem 0.5rem;
            border-bottom: 1px solid #f7f8fa;
            font-variant-numeric: tabular-nums;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover { background: #f7f9fc; }

        .ok { color: #16a34a; }
        .warn { color: #b07020; }

        a {
            color: #2563eb;
            text-decoration: none;
        }

        a:hover { color: #1d4ed8; }

        /* Toggle */
        details { margin: 0; }

        details summary {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #8993a4;
            cursor: pointer;
            list-style: none;
        }

        details summary:hover { color: #2563eb; }

        details summary::-webkit-details-marker { display: none; }

        details summary::before { content: "[+] "; }

        details[open] summary::before { content: "[-] "; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">recipe macros</a></h1>
            <span class="tagline">admin</span>
        </header>

        <p id="loading">loading...</p>
        <div id="content" style="display:none;">

            <div class="stat-grid" id="overview"></div>

            <div class="card">
                <div class="section-head">Daily Traffic</div>
                <table id="daily-table">
                    <thead><tr><th>date</th><th>requests</th><th>successful</th><th>failed</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <div class="section-head">Top Recipes</div>
                <table id="recipes-table">
                    <thead><tr><th>recipe</th><th>hits</th><th>last seen</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <div class="section-head">Recent Warnings</div>
                <table id="warnings-table">
                    <thead><tr><th>warning</th><th>count</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <div class="section-head">Recent Errors</div>
                <table id="errors-table">
                    <thead><tr><th>url</th><th>error</th><th>count</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <details>
                    <summary>Ingredient Overrides</summary>
                    <table id="overrides-table" style="margin-top: 0.75rem;">
                        <thead><tr><th>ingredient</th><th>fdc id</th><th>usda description</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </details>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = {{ api_key|tojson }};
        const headers = { 'X-Api-Key': API_KEY };

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function formatDate(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        function shortUrl(url) {
            try {
                const u = new URL(url);
                return u.hostname + u.pathname.replace(/\/$/, '');
            } catch { return url; }
        }

        async function load() {
            const [statsResp, warningsResp, errorsResp, overridesResp] = await Promise.all([
                fetch('/api/v1/logs/stats', { headers }),
                fetch('/api/v1/logs/warnings', { headers }),
                fetch('/api/v1/logs/errors', { headers }),
                fetch('/api/v1/overrides', { headers }),
            ]);

            const stats = await statsResp.json();
            const warnings = await warningsResp.json();
            const errors = await errorsResp.json();
            const overrides = await overridesResp.json();
            const o = stats.overview;

            const successRate = o.total_requests > 0
                ? Math.round((o.successful / o.total_requests) * 100) : 0;
            const cards = [
                { label: 'Total Requests', value: o.total_requests },
                { label: 'Successful', value: o.successful },
                { label: 'Failed', value: o.failed },
                { label: 'Success Rate', value: successRate + '%' },
                { label: 'Unique URLs', value: o.unique_urls },
                { label: 'Avg Duration', value: (o.avg_duration_s || 0).toFixed(2) + 's' },
            ];
            document.getElementById('overview').innerHTML = cards.map(c => `
                <div class="stat-card">
                    <span class="value">${c.value}</span>
                    <span class="label">${c.label}</span>
                </div>
            `).join('');

            const dailyBody = document.querySelector('#daily-table tbody');
            dailyBody.innerHTML = stats.daily.map(d => `
                <tr>
                    <td>${d.date}</td>
                    <td>${d.requests}</td>
                    <td class="ok">${d.successful}</td>
                    <td class="warn">${d.requests - d.successful}</td>
                </tr>
            `).join('');

            const recipesBody = document.querySelector('#recipes-table tbody');
            recipesBody.innerHTML = stats.top_recipes.map(r => `
                <tr>
                    <td><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title || shortUrl(r.url))}</a></td>
                    <td>${r.hits}</td>
                    <td>${formatDate(r.last_seen)}</td>
                </tr>
            `).join('');

            const warningsBody = document.querySelector('#warnings-table tbody');
            if (warnings.length === 0) {
                warningsBody.innerHTML = '<tr><td colspan="2" style="color:#8993a4;">No warnings</td></tr>';
            } else {
                warningsBody.innerHTML = warnings.map(w => `
                    <tr>
                        <td>${esc(w.warnings)}</td>
                        <td>${w.count}</td>
                    </tr>
                `).join('');
            }

            const errorsBody = document.querySelector('#errors-table tbody');
            if (errors.length === 0) {
                errorsBody.innerHTML = '<tr><td colspan="3" style="color:#8993a4;">No errors</td></tr>';
            } else {
                errorsBody.innerHTML = errors.map(e => {
                    const errMsg = e.error.split('\n')[0].replace(/^Client error '/, '').replace(/' for url.*/, '');
                    return `
                        <tr>
                            <td>${esc(shortUrl(e.url))}</td>
                            <td class="warn">${esc(errMsg)}</td>
                            <td>${e.count}</td>
                        </tr>
                    `;
                }).join('');
            }

            const overridesBody = document.querySelector('#overrides-table tbody');
            document.querySelector('details summary').textContent =
                'Ingredient Overrides (' + overrides.length + ')';
            overridesBody.innerHTML = overrides.map(o => `
                <tr>
                    <td>${esc(o.ingredient_name)}</td>
                    <td>${o.fdc_id}</td>
                    <td>${esc(o.usda_description || '-')}</td>
                </tr>
            `).join('');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        load();
    </script>
</body>
</html>
